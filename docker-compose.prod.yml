# docker-compose.prod.yml
# NOTE: This file is only used for self-host with Docker
# For Render deployment, Render builds the Dockerfile directly
# Supabase and Upstash are external — no local containers needed

services:
  api:
    build:
      context: .
      target: production
    container_name: careerarch-api
    restart: unless-stopped
    environment:
      - IS_DOCKER=true
      - NODE_ENV=production
    env_file:
      - .env.production
    ports:
      - '5000:5000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
