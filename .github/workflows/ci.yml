name: CI/CD — CareerArch Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Type Check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lint_placeholder

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: careerarch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 5001
      API_VERSION: v1
      FRONTEND_URL: http://localhost:3000
      API_URL: http://localhost:5001/api/v1
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/careerarch_test
      REDIS_URL: redis://localhost:6379/1
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      JWT_REFRESH_EXPIRY_REMEMBER_ME: 30d
      BCRYPT_ROUNDS: 4
      BREVO_SMTP_USER: test-smtp-user
      BREVO_SMTP_KEY: test-smtp-key
      MAIL_FROM_ADDRESS: test@careerarch.com
      MAIL_FROM_NAME: CareerArch Test
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      STRIPE_BASIC_PRICE_ID: price_test_basic
      STRIPE_PREMIUM_PRICE_ID: price_test_premium
      STRIPE_INCENTIVE_AMOUNT: 5000
      STRIPE_CURRENCY: usd
      AWS_ACCESS_KEY_ID: test-key-id
      AWS_SECRET_ACCESS_KEY: test-secret-key
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: test-bucket
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-secret
      GOOGLE_CALLBACK_URL: http://localhost:5001/api/v1/auth/google/callback
      LINKEDIN_CLIENT_ID: test-linkedin-client-id
      LINKEDIN_CLIENT_SECRET: test-linkedin-secret
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 10000
      LOGIN_RATE_LIMIT_MAX: 1000
      SENTRY_DSN: ''
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npm run db:migrate:prod

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/build_placeholder

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy to Render (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -f -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait and verify deployment
        run: |
          echo "Deployment triggered. Check status at:"
          echo "https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }}"
